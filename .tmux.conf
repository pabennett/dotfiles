# Fix Colors (catppuccin recommended: tmux-256color enables italics; terminal-overrides for true color)
# set -g default-terminal "screen-256color"
# set -as terminal-features ",xterm-256color:RGB"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# bind r to reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Ring the bell if any background window rang a bell
set -g bell-action any

bind-key ^D detach-client

# Create splits and vertical splits
bind-key v split-window -h -p 50 -c "#{pane_current_path}"
bind-key ^V split-window -h -p 50 -c "#{pane_current_path}"
bind-key s split-window -p 50 -c "#{pane_current_path}"
bind-key ^S split-window -p 50 -c "#{pane_current_path}"

# Mouse toggle
bind-key M \
  set-option -g mouse on \;\
  display-message 'Mouse: ON'
bind-key m \
  set-option -g mouse off \;\
  display-message 'Mouse: OFF'

# Use vi bindings for tmux commandline input
set -g status-keys vi

# Use vi keybindings in copy and choice modes
set -g mode-keys vi

# Fix keys in vim
set -g xterm-keys

# Display pane title and top of each pane
#set -g pane-border-status top

# easily toggle synch input for all panes in the window
bind e setw synchronize-panes on
bind E setw synchronize-panes off

set-option -g status-interval 2
unbind C-b
set -g prefix C-a
bind a send-prefix
set -sg escape-time 0
unbind l
bind C-a last-window
bind c new-window -c "#{pane_current_path}"

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'xamut/tmux-weather'

# Choose a theme
# Configure the catppuccin plugin
#set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor "mocha"
#set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_status_style "rounded"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
#run ~/.tmux/plugins/tmux/catppuccin.tmux # if using TPM
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right ""
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_application}"
#set -agF status-right "#{E:@catppuccin_status_weather}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right "#[bg=#{@thm_flamingo},fg=#{@thm_crust}]#[reverse]#[noreverse]  "
set -ag status-right "#[fg=#{@thm_fg},bg=#{@thm_mantle}] #(date) "
run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux
